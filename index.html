<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Builder</title>

<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  margin:20px;
}
h1{font-size:26px}

.section{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:16px;
}

.step{
  border:1px dashed #ccc;
  border-radius:10px;
  padding:12px;
  margin-top:12px;
}

label{
  font-weight:bold;
  display:block;
  margin-top:8px;
}

input{
  width:100%;
  padding:6px;
  margin-top:4px;
  box-sizing:border-box;
}

button{
  margin-top:8px;
  margin-right:6px;
  padding:8px 12px;
  font-size:14px;
  border:none;
  border-radius:8px;
  background:#0b6fb1;
  color:#fff;
  cursor:pointer;
}

button.secondary{background:#4caf50}
button.add{background:#673ab7}
button.delete{background:#c62828}
button.save{background:#ff9800}
button.clear{background:#555}
button.download{background:#222}
button.playbtn{background:#333}

.status{
  margin-top:6px;
  font-size:14px;
  color:#333;
}

.output{
  background:#eef2f6;
  border-radius:10px;
  padding:12px;
  margin-top:16px;
}

img.preview{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:8px;
  margin-top:6px;
  display:block;
}
</style>
</head>

<body>

<h1>Checklist Builder</h1>

<div class="section">
  <label for="title">Titel på checklistan</label>
  <input id="title" value="Min checklista" oninput="saveDraft()">

  <div id="steps"></div>

  <button class="add" onclick="addStep()">➕ Lägg till nästa steg</button>
  <button onclick="generateChecklist()">Generera checklista</button>
  <button class="download" onclick="downloadChecklist()">⬇️ Ladda ner checklista</button>
  <button class="save" onclick="saveDraft()">💾 Spara utkast</button>
  <button class="clear" onclick="clearDraft()">🗑 Rensa sparat</button>
</div>

<div class="section output" id="result" style="display:none"></div>

<script>
let stream = null;
let stepsData = [];
let currentRecorder = null;
let currentChunks = [];
let currentStepIndex = null;

async function initMic(){
  if(!stream){
    stream = await navigator.mediaDevices.getUserMedia({audio:true});
  }
}

function escapeHtml(str){
  return String(str || '')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function renderSteps(){
  const stepsDiv = document.getElementById('steps');
  stepsDiv.innerHTML = '';

  stepsData.forEach((step,index)=>{
    const div = document.createElement('div');
    div.className = 'step';

    div.innerHTML = `
      <label>Steg ${index + 1}</label>

      <input
        value="${escapeHtml(step.text || '')}"
        placeholder="Beskriv steget"
        oninput="stepsData[${index}].text=this.value;saveDraft()">

      <label>Bild</label>
      <input type="file" accept="image/*" onchange="loadImage(event,${index})">

      <img
        class="preview"
        id="img${index}"
        style="display:${step.img ? 'block' : 'none'}"
        src="${step.img || ''}">

      <label>Ljud</label>
      <button onclick="startRec(${index})">Spela in</button>
      <button class="secondary" onclick="stopRec()">Stoppa</button>
      <button class="playbtn" onclick="playRec(${index})">Lyssna</button>
      <button class="delete" onclick="removeStep(${index})">Ta bort steg</button>

      <div class="status" id="status${index}">
        ${step.audio ? 'Inspelning klar' : 'Ingen inspelning'}
      </div>
    `;

    stepsDiv.appendChild(div);
  });
}

function addStep(data = null){
  stepsData.push(data || {});
  renderSteps();
  saveDraft();
}

function removeStep(index){
  if(!confirm("Ta bort detta steg?")) return;

  stepsData.splice(index,1);

  if(stepsData.length === 0){
    stepsData = [{}];
  }

  renderSteps();
  saveDraft();
}

function loadImage(e,index){
  const file = e.target.files[0];
  if(!file) return;

  const r = new FileReader();
  r.onload = () => {
    stepsData[index].img = r.result;
    renderSteps();
    saveDraft();
  };
  r.readAsDataURL(file);
}

async function startRec(index){
  await initMic();

  currentStepIndex = index;
  currentChunks = [];

  currentRecorder = new MediaRecorder(stream);
  currentRecorder.ondataavailable = e => currentChunks.push(e.data);
  currentRecorder.onstop = saveRec;
  currentRecorder.start();

  document.getElementById('status' + index).innerText = 'Spelar in...';
}

function stopRec(){
  if(currentRecorder && currentRecorder.state === 'recording'){
    currentRecorder.stop();
  }
}

function saveRec(){
  const blob = new Blob(currentChunks,{type:'audio/webm'});
  const r = new FileReader();

  r.onload = () => {
    stepsData[currentStepIndex].audio = r.result;
    renderSteps();
    saveDraft();
  };

  r.readAsDataURL(blob);
}

function playRec(index){
  if(stepsData[index].audio){
    new Audio(stepsData[index].audio).play();
  }
}

function buildChecklistBody(){
  const title = document.getElementById('title').value || 'Min checklista';
  let content = `<h2>${escapeHtml(title)}</h2>`;

  stepsData.forEach((step,i)=>{
    if(!step.text) return;

    const safeText = escapeHtml(step.text);
    const img = step.img
      ? `<img src="${step.img}" style="width:160px;border-radius:8px"><br>`
      : '';

    const sound = step.audio
      ? `<button onclick="new Audio('${step.audio}').play()">Lyssna</button>`
      : '';

    content += `
      <div class="card">
        <strong>${i + 1}. ${safeText}</strong><br>
        ${img}
        ${sound}
        <label class="done-label">
          <input type="checkbox"> Klart
        </label>
      </div>
    `;
  });

  return content;
}

function buildChecklistHTML(){
  const title = document.getElementById('title').value || 'Min checklista';
  const body = buildChecklistBody();

  return `<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${escapeHtml(title)}</title>
<style>
body{
  font-family:Arial,Helvetica,sans-serif;
  background:#f3f5f7;
  margin:20px;
}
h2{font-size:26px}
.card{
  background:#fff;
  border-radius:12px;
  padding:16px;
  margin-bottom:12px;
}
button{
  margin-top:8px;
  padding:10px 14px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#0b6fb1;
  color:#fff;
  cursor:pointer;
}
img{
  max-width:100%;
  height:auto;
  border-radius:8px;
}
.done-label{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  font-size:16px;
}
.done-label input{
  width:auto;
  transform:scale(1.3);
}
</style>
</head>
<body>
${body}
</body>
</html>`;
}

function generateChecklist(){
  const body = buildChecklistBody();
  const result = document.getElementById('result');
  result.innerHTML = body;
  result.style.display = 'block';
}

function downloadChecklist(){
  const hasContent = stepsData.some(step => step.text || step.img || step.audio);

  if(!hasContent){
    alert('Checklistan är tom. Lägg till minst ett steg först.');
    return;
  }

  const html = buildChecklistHTML();
  const blob = new Blob([html],{type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
  URL.revokeObjectURL(a.href);
}

function saveDraft(){
  const draft = {
    title: document.getElementById('title').value,
    steps: stepsData
  };
  localStorage.setItem('checklistDraft', JSON.stringify(draft));
}

function loadDraft(){
  const saved = localStorage.getItem('checklistDraft');

  if(!saved){
    stepsData = [{}];
    renderSteps();
    return;
  }

  const draft = JSON.parse(saved);
  document.getElementById('title').value = draft.title || 'Min checklista';
  stepsData = (draft.steps && draft.steps.length) ? draft.steps : [{}];
  renderSteps();
}

function clearDraft(){
  if(confirm('Rensa sparad checklista?')){
    localStorage.removeItem('checklistDraft');
    location.reload();
  }
}

loadDraft();
</script>

</body>
</html>
